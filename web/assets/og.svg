<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0c0e0b"/>

  <!-- corner brackets -->
  <g fill="#48d597">
    <rect x="36" y="36" width="34" height="4"/><rect x="36" y="36" width="4" height="34"/>
    <rect x="1130" y="36" width="34" height="4"/><rect x="1160" y="36" width="4" height="34"/>
