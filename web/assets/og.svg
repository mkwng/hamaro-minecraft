  <text x="600" y="499" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="34" fill="#48d597">mc.rowan.wang</text>

  <!-- dither row -->
  <g fill="#2a3324">
    <rect x="420" y="560" width="8" height="8"/><rect x="436" y="560" width="8" height="8"/>
    <rect x="456" y="560" width="8" height="8"/><rect x="480" y="560" width="8" height="8"/>
