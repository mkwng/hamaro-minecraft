    <rect x="1130" y="590" width="34" height="4"/><rect x="1160" y="560" width="4" height="34"/>
  </g>

  <!-- pixel grass block (9x9, 16px cells) centered at x=600 -->
  <g transform="translate(528,72)">
    <rect x="0" y="0" width="144" height="64" fill="#78b943"/>
    <rect x="0" y="0" width="16" height="16" fill="#8ecf57"/>
    <rect x="48" y="16" width="16" height="16" fill="#8ecf57"/>
    <rect x="112" y="0" width="16" height="16" fill="#8ecf57"/>
    <rect x="80" y="32" width="16" height="16" fill="#5a9430"/>
    <rect x="16" y="32" width="16" height="16" fill="#5a9430"/>
    <rect x="0" y="64" width="144" height="80" fill="#7a5a3a"/>
    <rect x="16" y="80" width="16" height="16" fill="#8a6a48"/>
    <rect x="96" y="96" width="16" height="16" fill="#684a2e"/>
    <rect x="48" y="112" width="16" height="16" fill="#8a6a48"/>
    <rect x="128" y="72" width="16" height="16" fill="#684a2e"/>
